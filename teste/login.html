<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Usuario</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-straight/css/uicons-regular-straight.css'>
</head>
<body>

    <div class="icon-container">
        <i class="fi fi-rs-circle-user"></i>
    </div>

    <div class="conteiner">  
        <form action="login.html" method="post" class="formulario">
            <h1>Login</h1>

        <div class="input-box-email">
            <input type="text" name="email" placeholder="Email" required>
            <i class='bx bxs-user'></i>
        </div>

        <div class="senha">
        <div class="input-box-senha">
            <input type="Password" name="senha" id="senha" placeholder="Senha" class="inputUser" required>
            <i class='bx bxs-lock-alt' id="btn-senha" onclick="mostrarSenha()"></i>
        </div>
                    
            <script src="script.js"></script>
                    
        <div class="lembrar">
            <label><input type="checkbox"> Lembre-me</label>
            <a href="recuperar.html" class="click">Esqueceu senha?</a>
        </div>
        </div>
                

        <a href="site.html" class="btn">Login</a>
                
      <div>
            <p class="login-formulario">Não Tenho uma Conta <a href="formulario.html" class="click">  Cadastrar</a></p>
        </div>
        

        </form>
    </div>

</body>
</html>
