<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Usuario</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="conteiner">  
        <div class="theme-toggle">
            <i class='bx bx-moon' id="theme-icon"></i>
        </div>
        <div class="logo">
        <i class='bx bxs-user' style="font-size: 80px; color: #4A3622;"></i>
        </div>
        <form action="login.html" method="post" class="formulario">

        <div class="input-container">
    <div class="input-icon">
        <i class='bx bx-envelope'></i>
    </div>
    <input type="text" class="input-field" placeholder="Email" required>
</div>

<div class="input-container">
    <div class="input-icon">
        <i class='bx bx-lock-alt'></i>
    </div>
    <input type="password" class="input-field" id="senha" placeholder="Senha" required>
    <i class="bi bi-eye-fill password-toggle" id="btn-senha" onclick="mostrarSenha()"></i>
</div>
                <div class="lembrar">
            <label><input type="checkbox"> Lembre-me</label>
            <a href="recuperar.html" class="click">Esqueceu senha?</a>
        </div>

        <a href="index.html" class="btn" required>Login</a>
                
        <div class="cadastro-link">
            <p>Não Tenho uma Conta  <a href="cadastro.html" class="click">  Cadastrar</a></p>
        </div>

        <div class="social-login">
            <p class="social-text">Ou entre com:</p>
            <div class="social-icons">
                <a href="#" class="social-icon google">
                    <i class='bx bxl-google'></i>
                </a>
                <a href="#" class="social-icon facebook">
                    <i class='bx bxl-facebook'></i>
                </a>
            </div>
        </div>
        </form>
    </div>

    <script src="theme.js"></script>
    <script src="login.js"></script>
</body>
</html>
