<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Usuario</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="conteiner">  
        <img src="img/logo2.png" alt="Logo" class="logo">
        <form action="login.html" method="post" class="formulario">

        <div class="input-box-email">
            <input type="text" name="email" placeholder="Email" required>
            <i class='bx bxs-user'></i>
        </div>

        <div class="senha">
        <div class="input-box-senha">
            <input type="Password" name="senha" id="senha" placeholder="Senha" class="inputUser" required>
            <i class="bi bi-eye-fill" id="btn-senha" onclick="mostrarSenha()"></i>
        </div>           

        <div class="lembrar">
            <label><input type="checkbox"> Lembre-me</label>
            <a href="recuperar.html" class="click">Esqueceu senha?</a>
        </div>
        </div>         

        <a href="index.html" class="btn" required>Login</a>
                
      <div>
            <p class="login-formulario">Não Tenho uma Conta <a href="cadastro.html" class="click">  Cadastrar</a></p>
        </div>
        
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
