<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="style4.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="profile-container">
        <!-- Banner do perfil com foto centralizada -->
        <div class="profile-banner" id="profile-banner">
            <!-- Botão de voltar -->
            <div>
            <button class="back-button" onclick="window.location.href='index.html'">
                ←
            </button>
        </div>
            
            <!-- Botão para alterar banner -->
            <label for="banner-upload" class="banner-upload">
                <i class="fas fa-image"></i> Alterar banner
            </label>
            <input type="file" id="banner-upload" accept="image/*" style="display: none;">

            <!-- Foto de perfil posicionada no centro do banner -->
            <div class="profile-picture-section">
                <div class="profile-picture-container">
                    <img id="profile-picture-preview" src="https://via.placeholder.com/150" alt="">
                    <label for="profile-picture" class="upload-button">
                        <i class="fas fa-camera"></i> Alterar foto
                    </label>
                    <input type="file" id="profile-picture" accept="image/*" style="display: none;">
                </div>
            </div>
        </div>
        
        <div class="profile-content">
        
            <form id="profile-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name"><i class="fas fa-user"></i> Nome Completo</label>
                        <input type="text" id="name" placeholder="Digite seu nome completo" required>
                        <span class="error-message" id="name-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="username"><i class="fas fa-at"></i> Nome de Usuário</label>
                        <input type="text" id="username" placeholder="Digite seu username" required>
                        <span class="error-message" id="username-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                        <span class="error-message" id="email-error"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthdate"><i class="fas fa-birthday-cake"></i> Data de Nascimento</label>
                        <input type="date" id="birthdate">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="bio"><i class="fas fa-book-open"></i> Biografia</label>
                        <textarea id="bio" placeholder="Conte um pouco sobre você"></textarea>
                        <div class="char-counter"><span id="bio-counter">0</span>/200</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="favorite-author"><i class="fas fa-book"></i> Autor Favorito</label>
                        <input type="text" id="favorite-author" placeholder="Digite seu autor favorito">
                    </div>
                    
                    <div class="form-group">
                        <label for="interests"><i class="fas fa-heart"></i> Interesses</label>
                        <select id="interests" multiple>
                            <option value="Ficção">Ficção</option>
                            <option value="Romance">Romance</option>
                            <option value="Terror">Terror</option>
                            <option value="Mistério">Mistério</option>
                            <option value="Autoajuda">Autoajuda</option>
                            <option value="Dark Romance">Dark Romance</option>
                            <option value="Comédia">Comédia</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="cancel-button">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="save-button">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                </div>
            </form>
            
            <div id="success-message" class="success-message">
                <i class="fas fa-check-circle"></i> Perfil atualizado com sucesso!
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
