<body>

                    <div class="lembrar">

                <a href="doSite.html" class="btn">Login</a>
              
                    <p class="login-formulario">Não Tenho uma Conta <a href="cadastroFuncionario.html" class="click">  Cadastrar</a></p>

                </div>
            </form>
        </div>
